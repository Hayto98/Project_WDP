name: CI

on:
  push:
  pull_request:

jobs:
  backend-unit:
    name: Backend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/backend/package-lock.json
      - run: npm ci
      - run: npm run test:unit

  backend-integration:
    name: Backend integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/backend
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --quiet --eval 'db.adminCommand(\"ping\").ok' || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      MONGODB_URI: mongodb://127.0.0.1:27017/wdp_research_test
      REDIS_ENABLED: "false"
      EMAIL_ENABLED: "false"
      CORS_ORIGIN: http://localhost:5173
      JWT_SECRET: ci_jwt_secret
      JWT_REFRESH_SECRET: ci_refresh_secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/backend/package-lock.json
      - run: npm ci
      - run: npm run test:integration

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: web/frontend/package-lock.json
      - run: npm ci
      - run: npm run build
